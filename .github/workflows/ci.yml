name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: '**/pom.xml'

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run Maven tests except DynamoDB Local suite
        run: ./mvnw -B -T 1C --no-transfer-progress test -DexcludedGroups=dynamodb-local

  dynamodb-local-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: '**/pom.xml'

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run DynamoDB Local tests
        run: ./mvnw -B -T 1C --no-transfer-progress -pl domains/documents -am test -Dgroups=dynamodb-local
